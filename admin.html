<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Tameer-e-Seerat Model School</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>

    <h1>Tameer-e-Seerat Model School</h1>

    <p>Admission Management Dashboard</p>

</header>

<nav>

    <a href="index.html">Home</a>

    <a href="admission.html">Admission</a>

    <a href="admin.html">Admin Dashboard</a>

</nav>


<section class="dashboard">

    <h2>Student Admissions</h2>

    <table id="admissionTable">

        <thead>

            <tr>

                <th>Student Name</th>
                <th>Father Name</th>
                <th>Class</th>
                <th>Phone</th>
                <th>Action</th>

            </tr>

        </thead>

        <tbody>

        </tbody>

    </table>

</section>


<script>

async function loadAdmissions(){

    try{

        const response = await fetch("http://localhost:5000/admissions");

        const admissions = await response.json();

        const tbody = document.querySelector("#admissionTable tbody");

        tbody.innerHTML = "";

        if(admissions.length===0){

            tbody.innerHTML = `
                <tr>
                    <td colspan="5">No Admission Applications Found.</td>
                </tr>
            `;

            return;

        }

        admissions.forEach((student,index)=>{

            tbody.innerHTML += `

                <tr>

                    <td>${student.studentName}</td>

                    <td>${student.fatherName}</td>

                    <td>${student.classApplying}</td>

                    <td>${student.phone}</td>

                    <td>

                        <button onclick="deleteAdmission(${index})">

                            Delete

                        </button>

                    </td>

                </tr>

            `;

        });

    }

    catch(error){

        console.log(error);

        alert("Unable to connect to backend.");

    }

}



async function deleteAdmission(index){

    const confirmDelete = confirm("Are you sure you want to delete this admission?");

    if(!confirmDelete){

        return;

    }

    await fetch(`http://localhost:5000/admission/${index}`,{

        method:"DELETE"

    });

    loadAdmissions();

}


loadAdmissions();

</script>


</body>

</html>
